# Guild Initiation & Progression Quests
# Integrates Abyssal Skills with Guild Charters

# ============================================================
# GUILD CALL SHARD QUEST - Entry Point
# ============================================================

Quest:MSN_Quest_GuildCall {
    displayName = "The Call to the Guilds"
    description = "A shard washed ashore: 'Three voices. One choice.' Read it to receive the Guild Charters."
    type = "SideQuest"
    difficulty = "Easy"
    recommendedLevel = 5
    objectives = [
        {
            id = "read_shard",
            description = "Read the shard 'PUBLIC BROADCAST: Call to the Guilds'",
            type = "InventoryCheck",
            item = "Items.Shard_GuildCall",
            count = 1
        },
        {
            id = "choose_guild",
            description = "Choose your allegiance within 60 seconds (or face the penalty)",
            type = "GUILDSYSTEM",
            action = "GuildChoice"
        }
    ]
    rewards = {
        items = [
            { item = "Items.GuildCharter_OuroborosAlchemists", count = 1 },
            { item = "Items.GuildCharter_VoidRunners", count = 1 },
            { item = "Items.GuildCharter_LochSmugglers", count = 1 }
        ],
        xp = 5000,
        streetCred = 100
    }
    onComplete = "UnlockGuildSystem"
}

# ============================================================
# OUROBOROS ALCHEMISTS QUESTLINE (Binah Path)
# ============================================================

Quest:MSN_Quest_Alchemists_Initiation {
    displayName = "Initiation: The First Transmutation"
    description = "Prove your worth to the Ouroboros Alchemists. Transmute base matter into essence."
    type = "MainQuest"
    difficulty = "Normal"
    recommendedLevel = 10
    requiredGuild = "OuroborosAlchemists"
    prerequisites = ["MSN_Quest_GuildCall"]
    objectives = [
        {
            id = "gather_materials",
            description = "Gather: 10x Abyssal Ore, 5x Cryptid Essence, 1x Meteorite Fragment",
            type = "CollectItems",
            items = [
                { item = "Items.AbyssalOre", count = 10 },
                { item = "Items.CryptidEssence", count = 5 },
                { item = "Items.MeteoriteFragment", count = 1 }
            ]
        },
        {
            id = "craft_catalyst",
            description = "Craft a Legendary Catalyst at the Alchemy Station",
            type = "CraftItem",
            item = "Items.LegendaryCatalyst",
            count = 1
        },
        {
            id = "transmute",
            description = "Use the Catalyst to transmute Iron into Orichalcum",
            type = "UseAbility",
            ability = "Transmute_Material",
            target = "Iron",
            result = "Orichalcum"
        }
    ]
    rewards = {
        skillXP = { "alchemy": 10000, "metallurgy": 5000, "masterwork": 3000 },
        items = [{ item = "Items.OuroborosAlchemist_Robe", count = 1 }],
        perks = ["Abyssal_Guild_Ouroboros_TransmutationMastery"],
        xp = 15000
    }
}

