        {
            id = "navigate_blind",
            description = "Navigate the Trench with Optics Glitched (no minimap, distorted vision)",
            type = "Navigate",
            location = "Trench_BlindPath",
            condition = "OpticsGlitched"
        },
        {
            id = "offer_penance",
            description = "Offer 50% of Soul Coins and dismantle all Guild Charters at the Altar",
            type = "OfferAtAltar",
            location = "Trench_AltarOfPenance",
            cost = { "soulCoinsPercent": 50, "items": ["GuildCharter_All"] }
        }
    ]
    rewards = {
        skillXP = {},
        currency = {},
        effect = "GuildWarPenaltyCleared"
    }
