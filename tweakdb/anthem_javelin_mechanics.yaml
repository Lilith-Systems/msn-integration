# =============================================================================
# JAVELIN EXOSUIT BASE CLASS DEFINITIONS
# =============================================================================

TweakDB:
  # --- Javelin Exosuit Base Record ---
  JavelinExosuit_Base:
    displayName: "Javelin Exosuit"
    description: "Modular exosuit platform with heat management, flight capability, and combo primer/detonator system."
    category: "Exosuit"
    equipmentSlots: 6
    heatCapacity: 1000
    heatDissipationRate: 50 # per second grounded, 25 flying
    flightSpeed: 40 # m/s
    hoverDuration: 30 # seconds before heat penalty
    dodgeCharges: 2
    dodgeCooldown: 8
    ultimateChargeRate: 1.0 # multipliers from kills/combos
    primerSlots: 2
    detonatorSlots: 2
    supportSlots: 1
    colorCustomization: true

  # ===========================================================================
  # RANGER → MSN: VECTOR (Balanced, Precision, Versatile)
  # Sephirah: Tiphareth (Beauty) — Center, Harmony, Sacrifice
  # ===========================================================================

  Javelin_Vector:
    base: JavelinExosuit_Base
    displayName: "VECTOR Exosuit"
    description: "The original MSN exosuit. Balanced, adaptable, precise. Masters the combo system — prime with pulse, detonate with missile. No situation it cannot answer."
    archetype: "Ranger"
    sephirahAlignment: "Tiphareth"
    icon: "exosuit_vector"
    
    # Stats
    health: 1200
    shield: 800
    armor: 150
    meleeDamage: 300
    
    # Heat & Flight
    heatCapacity: 1000
    heatDissipationGrounded: 60
    heatDissipationFlying: 30
    flightSpeed: 45
    hoverTime: 35
    boostRecharge: 2.5
    
    # Combat
    weaponSlots: 
      - "AssaultRifle"
      - "SniperRifle"
      - "HeavyPistol"
      - "Melee"
    
    gearSlots: 2 # Active abilities
    supportSlots: 1
    
    # Prime Abilities (Primers)
    primer_01:
      name: "Seeking Plasma"
      type: "Primer"
      element: "Plasma"
      description: "Homing plasma bolts. Apply PLASMA PRIMER. Detonate for COMBO: EXPLOSION."
      ramCost: 2
      cooldown: 12
      damage: 400
      primerStrength: 100
      msnSynergy: "Netzach (Victory) — I persist."
      
    primer_02:
      name: "Frost Shard"
      type: "Primer"
      element: "Cryo"
      description: "Piercing ice shard. Apply CRYO PRIMER. Detonate for COMBO: SHATTER (AoE freeze)."
      ramCost: 3
      cooldown: 15
      damage: 350
      primerStrength: 120
      msnSynergy: "Yesod (Foundation) — I endure."

    primer_03:
      name: "Venom Dart"
      type: "Primer"
      element: "Toxin"
      description: "Biological toxin injector. Apply TOXIN PRIMER. Detonate for COMBO: SPREAD (AoE poison)."
      ramCost: 2
      cooldown: 10
      damage: 300
      primerStrength: 100
      dotDamage: 50 # per second
      dotDuration: 8
      msnSynergy: "Hod (Glory) — I corrupt."

    # Detonator Abilities
    detonator_01:
      name: "Missile Salvo"
      type: "Detonator"
      element: "Explosive"
      description: "Launch 6 micro-missiles. DETONATES all primers. COMBO effects scale with primer."
      ramCost: 4
      cooldown: 20
      missileCount: 6
      damagePerMissile: 250
      comboMultiplier: 2.5
      msnSynergy: "Tiphareth (Beauty) — I harmonize."
      
    detonator_02:
      name: "Pulse Blast"
      type: "Detonator"
      element: "Kinetic"
      description: "Close-range kinetic shockwave. DETONATES primers in 8m cone. High stagger."
      ramCost: 3
      cooldown: 12
      radius: 8
      damage: 600
      comboMultiplier: 3.0
      stagger: true
      msnSynergy: "Gevurah (Severity) — I judge."

    # Support Ability
    support_01:
      name: "Bulwark Point"
      type: "Support"
      description: "Deploy hardlight shield. Allies firing through gain +50% damage, primers auto-detonate."
      ramCost: 4
      cooldown: 25
      duration: 15
      shieldHealth: 2000
      damageBonus: 0.5
      autoDetonate: true
      msnSynergy: "Chesed (Mercy) — I protect."

    # Ultimate
    ultimate:
      name: "Multi-Target Seeker Battery"
      type: "Ultimate"
      description: "Lock onto up to 20 targets. Fire guided missiles that DETONATE all primers. Each kill refunds 5% ultimate."
      ramCost: 0 # Ultimate meter
      chargeRate: 1.0
      maxTargets: 20
      missilesPerTarget: 2
      damagePerMissile: 400
      comboMultiplier: 3.0
      msnSynergy: "Keter (Crown) — I transcend."
      visual: "Golden missiles with Sephirah trajectory lines"
      
    # Passive: Versatility
    passive:
      name: "Combat Versatility"
      description: "Weapon swap speed +50%. Reload speed +25%. Combo damage +20%. Ultimate charges 15% faster on combo kills."
      weaponSwapBonus: 0.5
      reloadBonus: 0.25
      comboDamageBonus: 0.2
      ultimateChargeBonus: 0.15

    # Visual Customization
    paintRegions: 4
    materialSlots: ["Primary", "Secondary", "Accent", "Emissive"]
    defaultColors:
      primary: "#1A1A2E" # Deep navy
      secondary: "#E94560" # MSN crimson
      accent: "#0F3460" # Deep blue
      emissive: "#E94560" # Crimson glow

    # Skins
    skins:
      - "MSN Standard Issue"
      - "Vector Prime" # Gold/White
      - "Abyssal Vector" # Void-black with bioluminescent veins
      - "Vector Archon" # White/Gold with Sephirah sigils
      - "Void Walker" # Translucent void material
      - "Pressure Hull" # Industrial deep-sea aesthetic


