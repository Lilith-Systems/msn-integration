      damage: 250
      radius: 6
      primerStrength: 100
      armorShred: 0.3
      msnSynergy: "Yesod (Foundation) — I freeze."

    # Detonator Abilities (Heavy Weapons)
    detonator_01:
      name: "Siege Cannon"
      type: "Detonator"
      element: "Explosive"
      description: "Chargeable heavy cannon. Full charge DETONATES all primers in 15m. Massive armor shred."
      ramCost: 5
      cooldown: 22
      chargeTime: 1.5
      damage: 1200
      radius: 10
      comboMultiplier: 3.5
      armorShred: 0.5
      msnSynergy: "Gevurah (Severity) — I break."

    detonator_02:
      name: "Flamethrower"
      type: "Detonator"
      element: "Fire"
      description: "Continuous fire stream. DETONATES primers in cone. Applies burning. High sustained DPS."
      ramCost: 4 # per second
      cooldown: 2 (overheat)
      dps: 800
      coneAngle: 60
      range: 12
      comboMultiplier: 2.0
      msnSynergy: "Chesed (Mercy) — I cleanse."

    # Support (Shield Mount)
    support_01:
      name: "Reinforced Bulwark"
      type: "Support"
      description: "Deploy directional energy shield. Blocks all damage. Allies behind gain damage reduction. Can mount heavy weapon on shield."
      ramCost: 5
      cooldown: 30
      duration: 20
      shieldHealth: 5000
      damageReductionBehind: 0.6
      weaponMount: true
      msnSynergy: "Binah (Understanding) — I hold."

    support_02:
      name: "Taunt Pulse"
      type: "Support"
      description: "Emit threat pulse. All enemies in 20m forced to target you. Gain damage reduction, heat dissipation +100%."
      ramCost: 4
      cooldown: 25
      duration: 10
      radius: 20
      damageReduction: 0.5
      heatDissipationBonus: 100
      msnSynergy: "Gevurah (Severity) — I draw."

    # Ultimate
    ultimate:
      name: "Siege Artillery Strike"
      type: "Ultimate"
      description: "Call down orbital kinetic rods. 3 impacts. Each DETONATES primers in massive radius. Creates persistent fire zones. Enemies in zones take doubling damage."
      chargeRate: 0.8
      impacts: 3
      radiusPerImpact: 15
      baseDamage: 2000
      comboMultiplier: 4.0
      persistentZoneDuration: 20
      zoneDamagePerSec: 500
      damageRamp: 1.1 # 10% increase per tick
      msnSynergy: "Keter (Crown) — I end."
      visual: "Golden rods with Geburah sigils, impact creates Sephirah tree crater"

    # Passive
    passive:
      name: "Siege Breaker"
      description: "Shield block reflects 50% damage. Primer application radius +50%. Detonator damage +30% vs primed. Ultimate charges 25% faster when blocking."
      reflectDamage: 0.5
