      detonatorVsPrimedBonus: 0.3
      ultimateChargeOnBlock: 0.25

    # Visual
    paintRegions: 4
    materialSlots: ["Primary", "Secondary", "Accent", "Emissive", "Shield"]
    defaultColors:
