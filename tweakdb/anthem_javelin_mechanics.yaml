# =============================================================================
# EXOSUIT HEAT MANAGEMENT SYSTEM (Anthem-style)
# =============================================================================

GameplaySettings:
  ExosuitHeatSystem:
    enabled: true
    maxHeat: 1000
    overheatingThreshold: 0.9
    overheatPenalty:
      movementSpeed: 0.5
