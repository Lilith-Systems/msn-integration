################################################################################
# ANTHEM-INSPIRED JAVELIN EXOSUIT MECHANICS FOR CYBERPUNK 2077
# Four Javelin Archetypes → Four Cyberpunk Exosuit Classes
# Integrated with MSN Sephirah System & Abyssal Assets
