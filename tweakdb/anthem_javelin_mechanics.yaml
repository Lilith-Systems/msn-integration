# =============================================================================
# COMBO SYSTEM (Anthem Primer/Detonator)
# =============================================================================

GameplaySettings:
  ComboSystem:
    enabled: true
    primerDuration: 10 # seconds
    detonateWindow: 5 # seconds after primer for bonus
    
    primerTypes:
      Fire:
        name: "Fire Primer"
        color: "#FF4500"
        comboEffect: "Explosion"
        comboDescription: "AoE fire explosion. Spreads to nearby. Burn DoT."
        comboDamageMult: 2.5
        
      Ice:
        name: "Cryo Primer"
        color: "#00BFFF"
        comboEffect: "Shatter"
        comboDescription: "AoE freeze. Armor shred 40%. Frozen enemies take 2x melee."
        comboDamageMult: 3.0
        
      Electric:
        name: "Electric Primer"
        color: "#FFFF00"
        comboEffect: "Chain Lightning"
        comboDescription: "Arcs to 4 nearby enemies. Each carries primer."
        comboDamageMult: 2.0
        chainTargets: 4
        
      Toxin:
        name: "Toxin Primer"
        color: "#32CD32"
        comboEffect: "Plague Cloud"
        comboDescription: "AoE poison cloud. Spreads on kill. 50% armor ignore."
        comboDamageMult: 2.0
        armorIgnore: 0.5
        
      Void:
        name: "Void Primer"
        color: "#8A2BE2"
        comboEffect: "Implosion"
        comboDescription: "Pull enemies to center. Silence 3s. Void damage ignores shield."
        comboDamageMult: 3.5
        shieldIgnore: true
        pullForce: 500
        
      Acid:
        name: "Acid Primer"
        color: "#ADFF2F"
        comboEffect: "Corrosion"
        comboDescription: "Armor melt 60% per second. Damage increases as armor drops."
        comboDamageMult: 2.0
        armorMeltPerSec: 0.6
        
      Radiation:
        name: "Radiation Primer"
        color: "#00FF7F"
        comboEffect: "Contamination"
        comboDescription: "Enemies irradiate allies. Healing blocked. Damage ramps over time."
        comboDamageMult: 2.0
        healingBlock: true
        damageRampPerSec: 0.1

    # Combo Scaling by Javelin
    javelinComboBonus:
      Vector: 1.2 # Balanced
      Bastion: 1.5 # High AoE
      Phantom: 2.0 # Single target execution
      Tempest: 2.5 # Multi-combo master

