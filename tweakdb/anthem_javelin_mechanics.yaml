      damage: 300
      chainCount: 4
      chainRange: 8
      primerStrength: 120
      msnSynergy: "Hod (Splendor) — I conduct."

    primer_03:
      name: "Cryo Grenade"
      type: "Primer"
      element: "Cryo"
      description: "Freeze grenade. Apply CRYO PRIMER. Detonate for COMBO: SHATTER (AoE freeze + armor brittleness)."
      ramCost: 3
