            encounter: "Encounter.Kraken_Matriarch_Echo"
            secondary: ["quest_reward", "debug_only"]
            quest: "q_abyssal_survival_01"
            requirements: ["Perk.Abyssal_MatriarchMercy", "NessieFriendship.Tier2"]
        - id: "Items.Nyx_Whisper_Monowire"
