################################################################################
# CUSTOM CONTENT ACQUISITION MAP
# Worker batch 2: playable glue for MSN / Abyssal Assets / Nessie content.
#
# This file maps major custom content families to in-game acquisition paths.
# It is intentionally YAML-only so REDmod/TweakXL, Lilith indexing, and future
# vendor/recipe/loot workers can consume the same source of truth.
################################################################################

AcquisitionMap:
  schema: "msn.custom_content_acquisition.v1"
  localOnly: true
  canonicalSources:
    weapons: "tweakdb/custom_weapons_expanded.yaml"
    cyberware: "tweakdb/custom_cyberware_expanded.yaml"
    clothing: "tweakdb/custom_clothing_expanded.yaml"
    vehicles: "tweakdb/custom_vehicles_expanded.yaml"
    quickhacks: "tweakdb/custom_quickhacks_expanded.yaml"
    shards: "tweakdb/custom_shards_expanded.yaml"
    customModels: "tweakdb/custom_models_msn_abyssal.yaml"
    javelins: "tweakdb/anthem_javelin_mechanics.yaml"
    nessieRewards: "tweakdb/nessie_rewards.yaml"
    skillSagas: "quests/abyssal_skill_tree_quests.yaml"

  acquisitionSources:
    - quest_reward
    - vendor
    - crafting_recipe
    - loot_table
    - exchange_listing
    - boss_drop
    - debug_only

  globalHooks:
    msn:
      required: true
      commandSurface:
        - "msn.models.list"
        - "msn.models.packs"
        - "msn.models.budget"
        - "msn.models.pipeline"
        - "abyssal.skills.quests"
        - "abyssal.skills.unlocks"
      memoryHooks:
        - "Ouroboros item acquisition journal"
        - "Sophia synthesis completion ledger"
        - "Hermes local command bridge"
    abyssal:
      required: true
      systems:
        - "Loch Exchange"
        - "Abyssal Fabricator"
        - "Soul Coins"
        - "Salvage Credits"
        - "Deep-zone contracts"
    nessie:
      required: true
      friendshipTiers: [1, 2, 3, 4, 5]
      nonHostilePolicy: "Nessie-facing unlocks must prefer sighting, offering, communion, or protection objectives over farming."
    ngd:
      required: true
      policy: "LOCAL_CEREBELLUM_GAME_FIRST"
      gpuTarget: "RTX 3060 Laptop GPU 6GB"
      guardrails:
        - "High-cost hero assets unlock through quests before open-world spawn."
        - "Vendors may preview locked items without loading full hero models."
        - "Loot tables must use LOD and spawn-budget tags for creatures, vehicles, and space encounters."

  contentFamilies:
    weapons:
      source: "custom_weapons_expanded.yaml"
      itemCount: 5
      defaultSources: ["quest_reward", "crafting_recipe", "boss_drop", "exchange_listing", "debug_only"]
      hooks: ["MSN sephirah attunement", "Abyssal Fabricator", "Nessie covenant mercy checks", "NGD weapon budget"]
