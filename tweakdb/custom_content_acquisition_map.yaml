          acquisition:
            primary: "quest_reward"
            quest: "q_abyssal_knowledge_01"
            secondary: ["crafting_recipe", "debug_only"]
            recipe: "Recipe.Voidsplitter_Phase_Core"
            requirements: ["Skill.Abyssal.SonarTuning", "MSN.Sephirah.Binah"]
        - id: "Items.Krakens_Wrath_Launcher"
          displayName: "Kraken's Wrath"
