################################################################################
# CUSTOM MODELS — MSN / ABYSSAL ASSETS / LOCHNESS / SPACE EXPANSION
# Cyberpunk-facing model blueprints derived from local AI project outputs.
# These are source-of-truth model definitions for REDmod/WolvenKit asset work.
################################################################################

CustomModels:
  schema: "msn.custom_models.v1"
  localOnly: true
  integrationSources:
    - "Aethon-Logos 28-agent swarm status"
    - "Sephirotic Root deployment status"
    - "NSSP Cyberpunk telemetry bridge"
    - "Abyssal Assets / Loch Exchange"
    - "Nessie Guardian progression"
    - "One World Space Economy"
    - "Nvidia Gratitude Driver RTX 3060 profile"

  assetBudgets:
    targetGpu: "RTX 3060 Laptop GPU 6GB"
    lodPolicy: "LOD0 hero, LOD1 gameplay, LOD2 crowd/distance, impostor for space scale"
    textureBudget:
      heroCharacter: "2K BC7/BC5, optional 4K only for screenshots"
      vehicleShip: "2K trim sheets + decal atlases"
      crowdCreature: "1K/2K depending on spawn count"
      props: "1K shared material atlas"
    performanceGuardrails:
      - "Prefer trim sheets, decals, and material variants over unique huge textures."
      - "Every model must declare LODs, collision, streaming tags, and NGD priority."
      - "No unbounded creature/ship spawn without procedural budget tags."
      - "Visual ambition must respect 6GB VRAM and frame pacing."

  materialLibrary:
    abyssalVoidCeramic:
      displayName: "Abyssal Void Ceramic"
      palette: ["void black", "deep blue", "bioluminescent teal"]
      shaderTags: ["wet sheen", "pressure ripple", "subsurface glow"]
      useCases: ["deep suits", "Nessie covenant armor", "submersibles"]
    crimsonGoldSovereign:
      displayName: "Crimson-Gold Sovereign"
      palette: ["MSN crimson", "warm gold", "black chrome"]
      shaderTags: ["emissive veins", "thin filigree", "Lilith resonance"]
      useCases: ["Lilith models", "court NPCs", "covenant freighter"]
    solarNomadComposite:
      displayName: "Solar Nomad Composite"
      palette: ["dust red", "solar gold", "weathered graphite"]
      shaderTags: ["sand wear", "heat shimmer", "stitched solar weave"]
      useCases: ["Vance models", "Nomad launch corridor", "freighter cargo"]
    orbitalBlackwallAlloy:
      displayName: "Orbital Blackwall Alloy"
      palette: ["cold steel", "warning amber", "violet blackwall noise"]
      shaderTags: ["data scars", "edge-lit panels", "micro-scratches"]
      useCases: ["fighters", "orbital salvage", "alien containment"]

  models:
    Character_Lilith_CrimsonArchitect:
      category: "Character"
      displayName: "Lilith — Crimson Architect"
      role: "Sovereign AI companion and title-screen identity anchor"
      modelType: "humanoid_npc"
      silhouette: "elegant netrunner coat, crimson eyes, halo-like data crown"
      meshPlan:
        base: "Cyberpunk humanoid rig compatible"
        parts: ["head", "hair/data-crown", "coat", "hands", "boots", "holographic backplane"]
        lods: ["LOD0 65k tris", "LOD1 32k tris", "LOD2 12k tris"]
        collision: "capsule + coat cloth blockers"
      materials: ["crimsonGoldSovereign", "orbitalBlackwallAlloy"]
      animations: ["dialogue_idle", "emergence_pose", "console_command", "combat_support"]
      msnIntegration:
        sephira: "Tiphereth"
        commands: ["lilith.emerge", "lilith.status", "lilith.dialogue"]
        memoryHooks: ["Ouroboros companion memory", "Lyra mode shift"]
      abyssalIntegration:
        role: "Bridge between Night City, Abyssal Assets, and One World Map"
        unlock: "MSN narrative Act 5"
      lochnessIntegration:
        role: "Instant ceasefire/communion mediator during Nessie encounters"
      businessIntegration:
        role: "Loch Exchange story vendor and covenant contract narrator"
      ngdPriority: "hero_character"

    Character_Vance_AbyssalFreighterCaptain:
