        name: "Kraken's Suckers"
        stats: { Armor: 100, WaterWalking: true, SilentSwim: true, CavitationBurst: true }
        visual: "Tentacle feet, adaptive suction cups, cavitation bubble emitters"
        mods: ["Abyssal", "Traversal", "Stealth"]
      Cloak:
        name: "Kraken's Ink"
        stats: { Armor: 80, InkCloud: true, VoidResistance: 0.5, NessieBond: true }
        visual: "Living ink cloak, bioluminescent patterns shift with mood, Nessie sigil"
        mods: ["Abyssal", "Ink", "Nessie"]

    setBonuses:
      2piece:
        description: "Abyssal Adaptation - Immune to pressure, water breathing, hydrothermal regen (5 HP/s in water/near vents). Ink Cloud on dodge (blinds, applies toxin)."
      4piece:
        description: "Kraken's Wrath - Melee attacks have 25% chance to summon tentacle (5s, attacks nearest enemy, applies void primer). Ink Cloud on perfect dodge (radius 8m, blinds, applies void primer)."
      6piece:
        description: "KRAKEN'S AWAKENING - Enter Abyssal Sovereign State: Summon Kraken Avatar (scaled to level, 30s), all abyssal quickhacks 0 RAM, water/void damage 3x, hydrothermal vents spawn at feet, Nessie aid (summon Nessie for 15s). Pressure immunity aura (20m). Duration 30s. Cooldown 5min. Visual: Massive kraken manifestation, bioluminescent explosion, hydrothermal vents erupt, Nessie silhouette."

    crafting:
      materials:
        - "40x Kraken Chitin"
        - "30x Bioluminescent Tissue"
        - "20x Hydrothermal Gel"
        - "15x Void Crystal"
        - "1x Kraken Heart (Nessie quest / Abyssal boss)"


