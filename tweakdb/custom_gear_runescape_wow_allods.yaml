Item:
  # =======================================================================
  # RUNESCAPE INSPIRED - Custom Names & Cyberpunk Aesthetics
  # =======================================================================

  # Scythe - "Soulreaper Monofilament"
  Melee_SoulreaperMonofilament:
    displayName: "Soulreaper Monofilament Scythe"
    description: "Death's harvest, mono-molecular edge. Each swing whispers names. Critical hits steal memory engrams."
    category: "Melee"
    subCategory: "Scythe"
    rarity: "Legendary"
    damage: 550
    damageType: "Physical+Void"
    attackSpeed: 1.0
    stats:
      CriticalChance: 0.15
      CriticalDamage: 1.5
      MemorySteal: true
      LifeSteal: 0.1
      FearRadius: 5
    mods: ["Blade", "Grip", "Void_Core", "Memory"]
    msnSynergy: ["Netzach (Victory) - I reap", "Phantom - Flow state"]
    visual: "Folding monofilament scythe, void-black shaft, glowing edge, souls visible in blade"
    skins: ["Standard", "Abyssal", "Reaper", "Tempest"]

  # Godsword - "Omnislave Directed-Energy Blade"
  Melee_OmnislaveBlade:
    displayName: "Omnislave Directed-Energy Blade"
    description: "Four corporate cores in one. Rotate modes: Arasaka (Fire), Militech (Explosive), Kang Tao (Electric), Night Corp (Void). Ultimate unity."
    category: "Melee"
    subCategory: "Greatsword"
    rarity: "Mythic"
    damage: 750
    damageType: "Variable"
    attackSpeed: 0.8
    stats:
      ModeSwap: true
      Modes:
        Arasaka: { DamageType: "Fire", Bonus: 0.3, Effect: "Ignite" }
        Militech: { DamageType: "Explosive", Bonus: 0.4, Effect: "ArmorShred" }
        KangTao: { DamageType: "Electric", Bonus: 0.3, Effect: "Chain" }
        NightCorp: { DamageType: "Void", Bonus: 0.5, Effect: "Silence" }
      UltimateCombo: "All four modes simultaneously for 10s (5min CD)"
    mods: ["Core", "Hilt", "Mode_Selector", "Unity"]
    msnSynergy: ["Keter (Crown) - I unify", "Tempest - Elemental mastery"]
    visual: "Four-colored blade segments, rotating core, mode indicator, unity flare"
    skins: ["Standard", "Corporate Unity", "Void Unity", "Tempest"]

  # Abyssal Whip - "Kraken's Tentacle Whip"
  Melee_KrakensTentacle:
    displayName: "Kraken's Living Tentacle Whip"
    description: "Living abyssal tentacle. Extends 15m. Each strike applies void/toxin. Grapple pull. Ink cloud on crit."
    category: "Melee"
    subCategory: "Whip"
    rarity: "Legendary"
    damage: 400
    damageType: "Physical+Void+Toxin"
    attackSpeed: 2.0
    range: 15
    stats:
      GrapplePull: true
      InkCloudOnCrit: true
      TentacleSummon: 0.15
      ToxinStacks: 3
      VoidDamage: 100
    mods: ["Tentacle", "Ink", "Venom", "Abyssal"]
    msnSynergy: ["Abyssal - Full", "Tempest - Venom seal", "Phantom - Flow"]
    visual: "Living tentacle, bioluminescent, ink sacs, suction cups"
    skins: ["Standard", "Kraken", "Void", "Nessie"]

  # =======================================================================
  # WORLD OF WARCRAFT INSPIRED - Custom Cyberpunk Versions
  # =======================================================================

  # Ashbringer - "Arasaka Dawnbreaker" (Corporate Paladin)
  Melee_ArasakaDawnbreaker:
