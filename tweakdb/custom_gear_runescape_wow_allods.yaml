        stats: { Armor: 350, Health: 400, Shield: 200, CorporateImmunity: true }
        visual: "Ceramic laminates, gold filigree, hidden weapon ports, sovereign seal"
        mods: ["Authority", "Immunity", "Corporate"]
      Gloves:
        name: "Shogun Kote"
