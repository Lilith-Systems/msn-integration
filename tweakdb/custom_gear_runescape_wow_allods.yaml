        name: "Shogun Sode"
        stats: { Armor: 100, Shield: 300, AuthorityAura: true, CorporateFear: true }
        visual: "Ceramic pauldrons, gold trim, floating authority markers, red Arasaka banner"
        mods: ["Shield", "Authority", "Fear"]

    setBonuses:
      2piece:
        description: "Corporate Sovereignty - Gain Authority stacks (max 10) on kills. Each: +2% all damage, +1% damage reduction. At 10: emit Authority Aura (10m, allies +10% damage)."
      4piece:
        description: "Executive Order - Melee kills execute targets below 30% health. Quickhacks cannot target you. Deployed turrets/drones gain your Authority stacks."
      6piece:
        description: "SHOGUN AWAKENING - Enter Sovereign State: Immune to all status effects, melee attacks apply Execute (30% threshold), quickhacks cannot affect you, summon 2 Arasaka drone guardians (Scaled to your level). All allies in 20m gain Corporate Immunity. Duration 25s. Cooldown 5min. Visual: Gold Arasaka crest manifests, sovereign decree echoes, red-black aura."

    crafting:
      materials:
        - "50x Arasaka Ceramic"
        - "20x Gold Filigree"
        - "15x Neural Gold"
        - "10x Sovereign Seal (Arasaka Tower)"
        - "1x Shogun Core (Saburo/Hanako quest)"

