# =============================================================================
# ARMOR SET SYSTEM (WoW Tier Sets + RS Armor Sets + Allods Glyphs)
# =============================================================================

TweakDB:
  # --- Armor Set Base ---
  ArmorSet_Base:
    setPieces: 6 # Helmet, Chest, Gloves, Legs, Boots, Cloak/Back
    setBonuses:
      2piece:
        description: "2-piece bonus"
      4piece:
        description: "4-piece bonus"
      6piece:
        description: "6-piece bonus (full set awakening)"
    visualTheme: ""
    msnSynergy: []
    abyssalIntegration: false
    anthemJavelinSynergy: []

  # ===========================================================================
  # TIER 1: STREET SAMURAI - "Chromanticore" (WoW T1 Warrior / RS Rune)
  # Sephirah: Gevurah (Severity) - Raw power, chrome perfection
  # Javelin: Bastion synergy
  # ===========================================================================

  ArmorSet_Chromanticore:
    base: ArmorSet_Base
    name: "Chromanticore Battlegear"
    sephirahAlignment: "Gevurah"
    javelinSynergy: ["Bastion"]
    visualTheme: "Mirror-chrome plates, hydraulic joints, neon trim, deployable shoulder cannons"
    msnSynergy: ["Gevurah (Severity)", "Vector (Ranger) - Precision strikes"]
    abyssalIntegration: false
    
    pieces:
      Helmet:
        name: "Chromanticore Visage"
        stats: { Armor: 180, Health: 150, MeleeDamage: 0.05 }
        visual: "Full-face chrome helm, retractable HUD visor, neon eyeslot"
        mods: ["Targeting", "ShieldRecharge"]
      Chest:
        name: "Chromanticore Cuirass"
        stats: { Armor: 300, Health: 300, ShieldRecharge: 0.1 }
        visual: "Mirror-plate torso, glowing core reactor, hydraulic muscles"
        mods: ["ShieldCapacity", "HeatDissipation"]
      Gloves:
        name: "Chromanticore Gauntlets"
        stats: { Armor: 120, MeleeDamage: 0.1, ReloadSpeed: 0.15 }
        visual: "Articulated chrome fingers, knuckle capacitors"
        mods: ["Melee", "Reload"]
      Legs:
        name: "Chromanticore Greaves"
        stats: { Armor: 200, MovementSpeed: 0.05, DodgeChance: 0.05 }
        visual: "Chrome thigh plates, hydraulic calves, neon knee joints"
        mods: ["Movement", "Evasion"]
      Boots:
        name: "Chromanticore Sabatons"
        stats: { Armor: 100, FallDamage: 0.5, GroundSlam: true }
        visual: "Heavy chrome boots, shock absorbers, ground-pound emitters"
        mods: ["Impact", "Stability"]
      Cloak:
        name: "Chromanticore Mantle"
        stats: { Armor: 80, HeatDissipation: 0.2, Intimidation: true }
        visual: "Heavy chrome-fiber cape, deployable shoulder pauldrons"
        mods: ["Thermal", "Presence"]

    setBonuses:
      2piece:
        description: "Chrome Resonance - Melee kills grant +20% movement speed and +15% melee damage for 8s. Stacks 3x."
      4piece:
        description: "Mirror's Edge - Blocking reflects 25% damage. Perfect block (last 0.3s) triggers shockwave (5m, 500 damage)."
      6piece:
        description: "CHROMANTICORE AWAKENING - Enter Mirror State: 100% damage reflection, melee attacks hit all enemies in 3m, chrome trail leaves damaging path. Duration 15s. Cooldown 3min. Visual: Full-body mirror flare, chromatic aberration."

    crafting:
      materials:
        - "50x Chrome Alloy"
        - "20x Hydraulic Polymer"
        - "10x Neural Interface"
        - "5x Kereznik Segment (rare drop from Chrome Jockeys)"
        - "1x Chromanticore Core (boss drop: Adam Smasher / Royce)"

  # ===========================================================================
  # TIER 2: NETRUNNER - "Voidweave Regalia" (WoW T2 Mage / RS Mystic / Allods Psionic)
  # Sephirah: Binah (Understanding) - Knowledge, structure, void
  # Javelin: Tempest synergy
  # Abyssal: Full integration
  # ===========================================================================

  ArmorSet_Voidweave:
    base: ArmorSet_Base
    name: "Voidweave Regalia"
    sephirahAlignment: "Binah"
    javelinSynergy: ["Tempest"]
    abyssalIntegration: true
    visualTheme: "Living void-fabric, shifting code patterns, bioluminescent circuitry, floating data shards"
    msnSynergy: ["Binah (Understanding)", "Tempest - Elemental mastery", "Abyssal - Void seal synergy"]
    
    pieces:
      Helmet:
        name: "Voidweave Crown"
        stats: { Armor: 100, RAM: 100, QuickhackDamage: 0.2, QuickhackCooldown: 0.15 }
        visual: "Floating void-ring crown, holographic third eye, data streaming"
        mods: ["RAM", "Quickhack", "Cooldown"]
      Chest:
        name: "Voidweave Robes"
        stats: { Armor: 150, Shield: 300, QuickhackDamage: 0.15, HeatDissipation: 0.25 }
        visual: "Living void fabric, shifting constellations, bioluminescent veins pulse with RAM"
        mods: ["Shield", "Quickhack", "Thermal"]
      Gloves:
        name: "Voidweave Gloves"
        stats: { Armor: 80, RAM: 50, QuickhackUpload: 0.3, PrimerStrength: 0.2 }
        visual: "Void-weave sleeves, fingertips emit code particles, primer sigils glow"
        mods: ["Upload", "Primer", "Speed"]
      Legs:
        name: "Voidweave Leggings"
        stats: { Armor: 120, MovementSpeed: 0.1, HoverTime: 0.2, HeatDissipation: 0.3 }
        visual: "Flowing void robes, hover-assist emitters, thermal vents"
        mods: ["Movement", "Hover", "Thermal"]
      Boots:
        name: "Voidweave Slippers"
        stats: { Armor: 60, SilentMovement: true, QuickhackRange: 0.25 }
        visual: "Weightless void footfalls, code particles trail, silent"
        mods: ["Stealth", "Range", "Stealth"]
      Cloak:
        name: "Voidweave Mantle"
        stats: { Armor: 50, Shield: 200, QuickhackCooldown: 0.2, VoidResistance: 0.5 }
        visual: "Tattered void cloak, floating code fragments, abyssal whisper visual"
        mods: ["Shield", "Cooldown", "Abyssal"]

    setBonuses:
      2piece:
        description: "Void Resonance - Quickhacks apply random primer (25% chance). Primers from quickhacks have +50% strength."
      4piece:
        description: "Structural Insight - Detonating a primer reveals all enemy weaknesses for 10s. Combo damage +50% vs revealed weaknesses."
      6piece:
        description: "VOIDWEAVE TRANSCENDENCE - Enter Binah State: All quickhacks cost 0 RAM, primers auto-apply on hit, combo damage 3x, hover indefinite, heat zero. Duration 20s. Cooldown 5min. Visual: Floating void mandala, code rain, Sephirah tree manifests."

    crafting:
      materials:
        - "30x Void-Silk"
        - "20x Neuro-Optical Fiber"
        - "15x Abyssal Crystal"
        - "10x Psionic Residue (Allods drop)"
        - "1x Voidweave Core (Abyssal Fabricator)"

  # ===========================================================================
  # TIER 3: NOMAD/TECHIE - "Aldecaldo Expedition" (WoW T3 Hunter / RS Desert / Allods Astral)
  # Sephirah: Netzach (Victory) - Endurance, motion, survival, art
  # Javelin: Phantom synergy
  # Story: Captain Vance questline
  # ===========================================================================

  ArmorSet_AldecaldoExpedition:
    base: ArmorSet_Base
    name: "Aldecaldo Expedition Gear"
    sephirahAlignment: "Netzach"
    javelinSynergy: ["Phantom"]
    visualTheme: "Worn nomad leather, solar-weave, modular pouches, clan insignias, weathered tech"
    msnSynergy: ["Netzach (Victory)", "Phantom - Flow state", "Captain Vance - Convoy command"]
    
    pieces:
      Helmet:
        name: "Nomad Ranger Hat"
        stats: { Armor: 120, Health: 100, DetectionRange: 0.3, HeadshotDamage: 0.2 }
        visual: "Wide-brim with solar band, retractable visor, clan feather"
        mods: ["Detection", "Precision", "Solar"]
      Chest:
        name: "Expedition Duster"
        stats: { Armor: 200, Health: 250, HeatDissipation: 0.3, SolarRegen: true }
        visual: "Long coat, solar-weave lining, modular armor plates, clan patches"
        mods: ["Thermal", "Solar", "Survival"]
      Gloves:
        name: "Trailblazer Grips"
        stats: { Armor: 100, MeleeDamage: 0.15, ReloadSpeed: 0.2, ThrowingDamage: 0.3 }
        visual: "Fingerless leather, reinforced knuckles, throwing knife slots"
        mods: ["Melee", "Reload", "Throwing"]
      Legs:
        name: "Wasteland Striders"
        stats: { Armor: 150, MovementSpeed: 0.15, StaminaRegen: 0.2, FallDamage: 0 }
        visual: "Reinforced knees, hidden pistol holsters, water reclamation"
        mods: ["Movement", "Stamina", "Survival"]
      Boots:
        name: "Dustwalker Boots"
        stats: { Armor: 80, FallDamage: 1.0, MovementSpeed: 0.1, SandWalk: true }
        visual: "Broken-in boots, magnetic soles, sand filters, silent tread"
        mods: ["Movement", "Impact", "Stealth"]
      Cloak:
        name: "Clan Banner Cloak"
        stats: { Armor: 60, TeamDamageBonus: 0.1, ReviveSpeed: 0.5, SolarRegen: true }
        visual: "Clan banner fabric, solar thread, convoy coordination array"
        mods: ["Team", "Support", "Solar"]

    setBonuses:
      2piece:
        description: "Trailblazer - Sprinting builds Momentum (stacks to 10). At max: next melee attack executes (execute threshold +20%). Dodge grants Momentum."
      4piece:
        description: "Convoy Tactics - Allies within 15m gain +15% damage and +20% movement. Reviving ally grants both Overdrive (40% damage, 30% speed, 10s)."
      6piece:
        description: "ALDECALDO LEGEND - Enter Horizon State: Infinite stamina, melee attacks chain to 3 targets, throwing weapons return, allies in 30m share your buffs. Convoy vehicle spawns (Vance's Rig). Duration 30s. Cooldown 4min. Visual: Clan banner unfurls, convoy hologram, solar flare."

    crafting:
      materials:
        - "40x Nomad Leather"
        - "20x Solar-Weave"
        - "15x Scrap Electronics"
        - "10x Clan Sigil (Vance reward)"
        - "1x Expedition Core (Nomad cache)"

  # ===========================================================================
  # TIER 4: CORPORATE ELITE - "Arasaka Shogun" (WoW T4 Paladin / RS Torva / Allods Justicar)
  # Sephirah: Keter (Crown) - Authority, sovereignty, transcendence
  # Javelin: Vector/Bastion hybrid
  # Story: Arasaka questline, Hanako/Saburo
  # ===========================================================================

  ArmorSet_ArasakaShogun:
    base: ArmorSet_Base
    name: "Arasaka Shogun Battlegear"
    sephirahAlignment: "Keter"
    javelinSynergy: ["Vector", "Bastion"]
    visualTheme: "Corporate perfection - matte black ceramic, gold trim, monofilament edges, Arasaka red accents, sovereign presence"
    msnSynergy: ["Keter (Crown)", "Lilith (Sovereign) - Authority", "Arasaka - Corporate sovereignty"]
    
    pieces:
      Helmet:
        name: "Shogun Kabuto"
