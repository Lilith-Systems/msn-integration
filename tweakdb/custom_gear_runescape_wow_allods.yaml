    abyssalIntegration: true
    visualTheme: "Living abyssal tissue, bioluminescent veins, tentacle motifs, hydrothermal vents, void-chitin, kraken chitin"
    msnSynergy: ["Yesod (Foundation)", "Malkuth (Kingdom)", "Abyssal - Full integration", "Nessie - Bond"]
    
    pieces:
      Helmet:
        name: "Kraken's Crown"
        stats: { Armor: 150, Health: 150, WaterBreathing: true, PressureImmunity: true, SonarSense: true }
        visual: "Kraken chitin helm, bioluminescent tendrils, sonar dome, third eye"
        mods: ["Abyssal", "Pressure", "Sonar"]
      Chest:
        name: "Kraken's Carapace"
        stats: { Armor: 300, Health: 300, Shield: 100, HydrothermalRegen: true, VoidResistance: 0.75 }
        visual: "Living kraken chitin, bioluminescent veins pulse with heartbeat, hydrothermal vents on shoulders"
        mods: ["Abyssal", "Hydrothermal", "Void"]
      Gloves:
        name: "Kraken's Grasp"
        stats: { Armor: 120, MeleeDamage: 0.3, TentacleStrike: true, InkCloud: true }
        visual: "Tentacle-like fingers, bioluminescent suckers, ink sacs, void-chitin claws"
