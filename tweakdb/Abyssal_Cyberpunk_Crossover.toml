    "You knew him as the Shipwreck King. I knew him as my boy, Tomas.",
    "",
    "He drowned in the Graveyard 20 years ago. The bone-crabs rebuilt him.",
    "Piece by piece. Memory by memory. He forgot the surface. Forgot me.",
    "",
    "When you defeated him in the duel... he REMEMBERED.",
    "He asked me to tell you: 'The hull holds.'",
    "",
    "Enclosed: Hull Plate (crafting material). Salvaging Mastery unlocked.",
    "",
    "The First War is over. The Graveyard is neutral now.",
    "The bone-crabs serve the Exchange. The Admiral's Bicorn is yours.",
    "",
    "- The Boatwright",
    "",
    "P.S. The Kelp Witch sends her regards. The pipeline is sealed."
]

