            guaranteed: ["Engram_Shard.common", "SoulCoins.medium", "OldNetFragment.common"]
            weighted: ["Arasaka_Shogun.fragment", "Ouroboros_Coil.component", "Archive_Access_Key.rare"]
            rare: ["Ouroboros_Coil.assembled", "Engram_Shard.unique", "Archive_Admin_Credentials.legendary"]
            timeGate: "External timer: 15:00 vault auto-purge (cannot be rewound)"
