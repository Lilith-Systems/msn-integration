        - id: "deep_archive_silent_extraction"
          weight: 30
          enemyOrAlienArchetype: "Archive Sentinel squads with Data Remora swarms, one Cryo Wraith overseer"
          hazard: "Black ICE scanner sweep, cryo stasis pulse, engram defense daemon"
          objective: "Extract target engram cluster without triggering purge protocol"
