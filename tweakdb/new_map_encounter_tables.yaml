          lilithBridge: "Fork 3 (The Trader) can negotiate daemon stand-down at Tier 3+ Lilith relation"

        - id: "deep_archive_cryo_wraith_hunt"
          weight: 20
          enemyOrAlienArchetype: "Cryo Wraith alpha with Archive Sentinel honor guard"
          hazard: "Spreading cryo field, stasis trap corridors, false engram decoys"
          objective: "Destroy Cryo Wraith core before it assimilates the sector"
          ngdDependency: "VRAM pressure modulates cryo field spread rate (high VRAM = slower spread)"
          rewardPool:
            guaranteed: ["Cryo_Core.component", "SoulCoins.large", "BlackIce_Sample.common"]
            weighted: ["Arasaka_Shogun.cryo_mod", "Archive_Sentinel.chassis_fragment", "Nyx_Whisper_Monowire.cryo_tune"]
            rare: ["Vehicle_PhantomNeedle_Fighter_ArchiveNeedle.cryo_livery", "Engram_Shard.legendary"]
          recommendedSuitOrVehicle: "Exosuit_VectorStarling_Javelin"

        - id: "deep_archive_memory_auction"
