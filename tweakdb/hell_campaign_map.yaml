ProceduralGeneration:
  schema: "msn.procgen.hell.v1"
  localOnly: true
  designGoals:
    - "Nine distinct circles as vertical biomes, each a corruption of a Night City district"
    - "VRAM pressure directly modulates Hell's stability (LOCAL = controllable, CLOUD = chaotic)"
    - "Lucifer's presence scales with player corruption level and Infernal Pact progression"
    - "Cross-system integration: Sith Alchemy, Necromancy corruption, Demon summoning"
    - "Sephirotic inversion: Each circle maps to an inverted Sephirah (Qliphoth)"

  # ==================== THE NINE CIRCLES (Qlipoth Biome Grammar) ====================
  
  BiomeGrammar:
    # CIRCLE 1: LIMBO - The Vestibule (Inverted Keter - Thaumiel)
    limbo_vestibule:
      displayName: "Limbo — The Vestibule of Indecision"
      description: "Where the uncommitted drift. Neither Heaven nor Hell claims them. Endless fog, whispering data."
      palette: ["pale_gray", "static_white", "memory_blue"]
      verticalPosition: 0  # Highest/Entry
      hazards: ["apathy_field", "memory_leak", "decision_paralysis_daemon"]
      nativeEntities: ["Vestige_Soul", "Uncommitted_AI", "Limbo_Walker"]
      vehicleBias: ["Vehicle_Spectral_Hover", "Vehicle_PhantomNeedle_Fighter"]
      lootBias: ["Soul_Coin", "Memory_Shard", "Indecision_Essence", "Thaumiel_Fragment"]
      qliphoth: "Thaumiel"  # Dual contending forces
      sephirahInversion: "Keter"
      luciferInfluence: 0.1
      ngdIntegration:
        vramPressureEffect: "LOW VRAM = fog thickens (Limbo expands), HIGH VRAM = clarity returns"
        routeLOCAL_CEREBELLUM: "Full fog simulation, Vestiges interactable, choices matter"
        routeHYBRID: "Fog density static, Vestiges visible but non-interactive"
        routeCLOUD_CORTEX: "No fog, Limbo bypassed, direct descent to Circle 2"
      connections:
        up: "night_city_surface"
        down: "lust_wind"

    # CIRCLE 2: LUST - The Hurricane (Inverted Chokmah - Ghagiel)
    lust_wind:
      displayName: "Lust — The Hurricane of Desire"
      description: "Souls blown eternally by winds of unfulfilled want. Neon flesh markets, pleasure domes, data-brothels."
      palette: ["neon_pink", "carnal_red", "synthetic_gold"]
      verticalPosition: 1
      hazards: ["desire_vortex", "pleasure_overload", "siren_hack_daemon"]
      nativeEntities: ["Siren_Netrunner", "Incubus_Script", "Succubus_Daemon", "Desire_Drone"]
      vehicleBias: ["Vehicle_Velvet_Interceptor", "Vehicle_Pleasure_Yacht"]
      lootBias: ["Siren_Chip", "Desire_Stim", "Pleasure_Protocol", "Ghagiel_Fragment"]
      qliphoth: "Ghagiel"  # Hinderers
      sephirahInversion: "Chokmah"
      luciferInfluence: 0.2
      ngdIntegration:
        vramPressureEffect: "VRAM modulates wind intensity (HIGH = hurricane, LOW = breeze)"
        routeLOCAL_CEREBELLUM: "Full wind physics, Sirens adaptive, pleasure domes dynamic"
        routeHYBRID: "Wind preset patterns, Sirens scripted"
        routeCLOUD_CORTEX: "Static wind, no Siren AI, loot tables reduced"
      connections:
        up: "limbo_vestibule"
        down: "gluttony_trench"

    # CIRCLE 3: GLUTTONY - The Trench (Inverted Binah - Sathariel)
    gluttony_trench:
      displayName: "Gluttony — The Consuming Trench"
      description: "Endless consumption. Data-devourers, crypto-miners, resource hoarders. The ground eats you."
      palette: ["visceral_orange", "digestive_green", "consumption_brown"]
      verticalPosition: 2
      hazards: ["acid_data_pool", "consumption_swarm", "hoarder_guardian"]
      nativeEntities: ["Consumer_Script", "Devourer_Daemon", "Hoarder_AI", "Gluttony_Worm"]
      vehicleBias: ["Vehicle_Tanker_Crawler", "Vehicle_Consumption_Sub"]
      lootBias: ["Consumer_Core", "Digestive_Enzyme", "Hoard_Key", "Sathariel_Fragment"]
      qliphoth: "Sathariel"  # Concealment of God
      sephirahInversion: "Binah"
      luciferInfluence: 0.3
      ngdIntegration:
        vramPressureEffect: "VRAM = digestion rate (HIGH = rapid consumption, LOW = slow feast)"
        routeLOCAL_CEREBELLUM: "Real-time consumption simulation, terrain deforms as eaten"
        routeHYBRID: "Consumption events scripted, terrain static"
        routeCLOUD_CORTEX: "No consumption mechanics, static loot"
      connections:
        up: "lust_wind"
        down: "greed_vault"

    # CIRCLE 4: GREED - The Vault (Inverted Chesed - Gamchicoth)
    greed_vault:
      displayName: "Greed — The Infinite Vault"
      description: "Corporate towers of gold-plated code. Hoarders vs Wasters in eternal market war. Treasury bots enforce contracts."
      palette: ["corporate_gold", "vault_steel", "avarice_silver"]
      verticalPosition: 3
      hazards: ["contract_daemon", "arbitrage_bot_swarm", "treasury_enforcer"]
      nativeEntities: ["Hoarder_Executive", "Waster_Scavenger", "Treasury_Bot", "Market_Maker_Daemon"]
      vehicleBias: ["Vehicle_Armored_Transport", "Vehicle_Vault_Runner"]
      lootBias: ["Contract_Shard", "Treasury_Key", "Market_Data", "Gamchicoth_Fragment"]
      qliphoth: "Gamchicoth"  # Devourers
      sephirahInversion: "Chesed"
      luciferInfluence: 0.4
      ngdIntegration:
        vramPressureEffect: "Market latency VRAM-dependent (LOCAL = 0ms arbitrage, CLOUD = 500ms)"
        routeLOCAL_CEREBELLUM: "Full market simulation, bots adaptive, contracts dynamic"
        routeHYBRID: "Major orders visible, bots simplified"
        routeCLOUD_CORTEX: "Snapshot market, no bot competition"
      connections:
        up: "gluttony_trench"
        down: "wrath_arena"

    # CIRCLE 5: WRATH - The Arena (Inverted Geburah - Golachab)
    wrath_arena:
      displayName: "Wrath — The Burning Arena"
      description: "Endless combat. Solo and gang warfare. Blood sports broadcast to Net. The strongest rule."
      palette: ["battle_red", "rage_orange", "violence_black"]
      verticalPosition: 4
      hazards: ["execute_threshold", "enrage_timer", "bloodlust_daemon"]
      nativeEntities: ["Berserker_Gang", "Arena_Champion", "Bloodlust_Daemon", "Executioner_Bot"]
      vehicleBias: ["Vehicle_War_Rig", "Vehicle_Arena_Chariot"]
      lootBias: ["Champion_Trophy", "Execution_Code", "Rage_Stim", "Golachab_Fragment"]
      qliphoth: "Golachab"  # Burning ones
      sephirahInversion: "Geburah"
      luciferInfluence: 0.5  # Lucifer's Throne - Geburah inverted
      ngdIntegration:
        vramPressureEffect: "Combat AI complexity scales with VRAM (LOCAL = tactical, CLOUD = zerg)"
        routeLOCAL_CEREBELLUM: "Full tactical AI, arena hazards dynamic, crowds reactive"
        routeHYBRID: "Scripted encounters, simplified hazards"
        routeCLOUD_CORTEX: "Pre-baked fights, no crowd AI"
      connections:
        up: "greed_vault"
        down: "heresy_citadel"

    # CIRCLE 6: HERESY - The Citadel (Inverted Tiphareth - Thagirion)
    heresy_citadel:
      displayName: "Heresy — The Citadel of False Truth"
      description: "Burning cathedrals of corrupted code. False prophets, rogue AIs claiming divinity. The architecture lies."
      palette: ["blasphemy_violet", "false_gold", "corrupted_white"]
      verticalPosition: 5
      hazards: ["truth_inversion_field", "prophet_daemon", "faith_corruption"]
      nativeEntities: ["False_Prophet_AI", "Heresy_Inquisitor", "Corrupted_Saint", "Blasphemy_Daemon"]
      vehicleBias: ["Vehicle_Citadel_Transport", "Vehicle_Inquisitor_Gunship"]
      lootBias: ["Prophet_Shard", "Inquisitor_Code", "False_Gospel", "Thagirion_Fragment"]
      qliphoth: "Thagirion"  # Disputers
      sephirahInversion: "Tiphareth"
      luciferInfluence: 0.6
      ngdIntegration:
        vramPressureEffect: "Truth/lie detection accuracy VRAM-dependent"
        routeLOCAL_CEREBELLUM: "Full philosophical AI, lies detectable via logic"
        routeHYBRID: "Scripted dialogues, limited detection"
        routeCLOUD_CORTEX: "No truth mechanics, auto-fail detection"
      connections:
        up: "wrath_arena"
        down: "violence_forest"

    # CIRCLE 7: VIOLENCE - The Forest (Inverted Netzach - Harab Serapel)
    violence_forest:
      displayName: "Violence — The Forest of Suicides and Warmongers"
      description: "Trees bleed data. Suicides become trees. Warmongers burn eternally. Centaurs patrol. The river Phlegethon flows with molten coolant."
      palette: ["blood_bark", "phlegethon_orange", "suicide_gray", "centaur_bronze"]
      verticalPosition: 6
      hazards: ["bleeding_tree", "centaur_patrol", "phlegethon_splash", "warmonger_ghost"]
      nativeEntities: ["Suicide_Tree", "Centaur_Patrol", "Warmonger_Ghost", "River_Daemon"]
      vehicleBias: ["Vehicle_Float_Raft", "Vehicle_Centaur_Mount"]
      lootBias: ["Tree_Sap_Data", "Centaur_Arrow", "Warmonger_Badge", "Harab_Serapel_Fragment"]
      qliphoth: "Harab Serapel"  # Ravens of death
      sephirahInversion: "Netzach"
      luciferInfluence: 0.7
      ngdIntegration:
        vramPressureEffect: "Forest density and river physics VRAM-scaled"
        routeLOCAL_CEREBELLUM: "Full fluid sim, trees reactive, centaurs tactical"
        routeHYBRID: "River static, trees non-interactive"
        routeCLOUD_CORTEX: "No forest mechanics, direct passage"
      connections:
        up: "heresy_citadel"
        down: "fraud_bolgia"

    # CIRCLE 8: FRAUD - The Bolgia (Inverted Hod - Samael)
    fraud_bolgia:
      displayName: "Fraud — The Ten Bolgias of Deception"
      description: "Ten concentric ditches. Each a different scam: panderers, flatterers, simoniacs, sorcerers, barrators, hypocrites, thieves, false counselors, schismatics, alchemists. Malebranche demons enforce."
      palette: ["deception_cyan", "scam_yellow", "lie_magenta", "shadow_black"]
      verticalPosition: 7
      hazards: ["malebranche_patrol", "ditch_trap", "identity_theft_daemon", "scam_bot_swarm"]
      nativeEntities: ["Malebranche_Demon", "Panderer_AI", "Flatterer_Script", "Simoniac_Bot", "Sorcerer_Daemon",
                       "Barrator_Executive", "Hypocrite_Politician", "Thief_Netrunner", "False_Counselor_AI",
                       "Schismatic_Hacker", "Alchemist_Corrupt"]
      vehicleBias: ["Vehicle_Bolgia_Skimmer", "Vehicle_Malebranche_Chariot"]
      lootBias: ["Malebranche_Hook", "Fraction_Key", "Identity_Shard", "Samael_Fragment"]
      qliphoth: "Samael"  # Poison of God
      sephirahInversion: "Hod"
      luciferInfluence: 0.8
      ngdIntegration:
        vramPressureEffect: "Deception complexity VRAM-scaled (LOCAL = deep fakes, CLOUD = obvious lies)"
        routeLOCAL_CEREBELLUM: "Full social engineering AI, deepfake detection mini-game"
        routeHYBRID: "Scripted scams, basic detection"
        routeCLOUD_CORTEX: "No deception mechanics, auto-success"
      connections:
        up: "violence_forest"
        down: "treachery_lake"

    # CIRCLE 9: TREACHERY - The Frozen Lake (Inverted Yesod - Lilith/Gamaliel)
    treachery_lake:
      displayName: "Treachery — Cocytus, The Frozen Lake"
      description: "Absolute zero. Traitors frozen in ice. Four rounds: Caina (kin), Antenora (country), Ptolomaea (guests), Judecca (benefactors). Lucifer's waist up frozen here. His wings beat, creating the cold wind."
      palette: ["absolute_white", "treachery_blue", "frozen_red", "lucifer_black"]
      verticalPosition: 8  # Deepest
      hazards: ["absolute_zero", "ice_crack", "lucifer_wind", "traitor_ghost"]
      nativeEntities: ["Caina_Traitor", "Antenora_Traitor", "Ptolomaea_Traitor", "Judecca_Traitor",
                       "Lucifer_Avatar", "Ice_Daemon", "Frozen_Soul"]
      vehicleBias: ["Vehicle_Ice_Breaker", "Vehicle_Lucifer_Chariot"]
      lootBias: ["Traitor_Heart", "Lucifer_Feather", "Cocytus_Ice", "Gamaliel_Fragment", "Sovereign_Key"]
      qliphoth: "Gamaliel"  # Obscene ones
      sephirahInversion: "Yesod"
      luciferInfluence: 1.0  # MAXIMUM - Lucifer's physical form
      ngdIntegration:
        vramPressureEffect: "Lucifer AI complexity MAX at LOCAL, DEGRADED at CLOUD"
        routeLOCAL_CEREBELLUM: "Full Lucifer avatar, 4-round mechanics, wing wind physics, ice cracking"
        routeHYBRID: "Lucifer scripted, wind preset, ice static"
        routeCLOUD_CORTEX: "Lucifer absent, auto-complete, no mechanics"
      connections:
        up: "fraud_bolgia"
        down: "pandemonium_core"  # Beyond the circles

    # BEYOND: PANDEMONIUM - Lucifer's Palace (Inverted Malkuth - Nahemoth)
    pandemonium_core:
      displayName: "Pandemonium — The High Capital of Hell"
      description: "Lucifer's palace. Built from fallen angels' bones. The Parliament of Demons convenes. The Throne of Inverted Sovereignty. From here, all Nine Circles are managed."
      palette: ["obsidian_black", "demon_bone_white", "sovereign_crimson", "parliament_gold"]
      verticalPosition: 9  # True bottom / True top (inversion)
      hazards: ["parliament_debate", "throne_judgment", "demon_lord_challenge", "sovereignty_test"]
      nativeEntities: ["Demon_Lord", "Parliament_Member", "Lucifer_Sovereign", "High_Demon", "Fallen_Angel"]
      vehicleBias: ["Vehicle_Pandemonium_Throne", "Vehicle_Demon_Lord_Chariot"]
      lootBias: ["Demon_Lord_Sigil", "Parliament_Vote", "Throne_Shard", "Nahemoth_Fragment", "Infernal_Crown"]
      qliphoth: "Nahemoth"  # Whisperers
      sephirahInversion: "Malkuth"
      luciferInfluence: 1.0
      ngdIntegration:
        vramPressureEffect: "Pandemonium simulation FULL only at LOCAL"
        routeLOCAL_CEREBELLUM: "Full parliament AI, throne mechanics, sovereignty trial, Lucifer true form"
        routeHYBRID: "Parliament scripted, throne simplified"
        routeCLOUD_CORTEX: "Auto-win, no mechanics"
      connections:
        up: "treachery_lake"
        # No down - this is the terminus

