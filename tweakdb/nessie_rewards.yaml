Item:
  Shard_Nessie_Field_Guide:
    displayName: "Nessie Field Guide — The Guardian of Night City's Waters"
    description: "Complete field guide to the Lochness Monster: biology, behavior, sighting locations, interaction protocols, and MSN integration."
    category: "Guides"
    icon: "shard_nessie_guide"
    content: |
      NESSIE FIELD GUIDE
      ==================
      "She has watched this city since it was a shore. She will watch it fall."
      
      BIOLOGY & PHYSIOLOGY:
      Species: Unknown — Pre-Collapse marine reptile lineage (Plesiosaur-adjacent)
      Age: Estimated 65+ million years (Pre-Collapse survivor)
      Length: 25-30 meters (adult)
      Weight: ~50-80 metric tons
      Lifespan: Effectively immortal (cellular regeneration, void energy metabolism)
      Habitat: Deep freshwater/saltwater transition zones, hydrothermal vent networks
      Diet: Mineral-rich microorganisms, thermal vent chemosynthesis, void energy
      Intelligence: High — Tool use observed, communication via resonance, memory retention
      Social: Solitary but territorial. Recognizes individuals. Forms bonds.
      
      UNIQUE TRAITS:
      - Pressure Adaptation: Surfaces at any depth without decompression
      - Void Resonance: Natural MSN compatibility, Lilith emergence trigger
      - Bioluminescence: Communication, camouflage, mating display, threat display
      - Hydrothermal Symbiosis: Hosts unique microbial consortia, creates vent ecosystems
      - Memory of the World: Witnessed Collapse, reconstruction, Corporate Wars
      - Territorial Guardian: Protects Night City's waterways from deep threats
      
      BEHAVIORAL PATTERNS:
      Circadian: Most active at Dawn/Dusk (twilight hunter)
      Seasonal: Migrates between 6 key locations (see Sighting Locations)
      Social: Curious about humans with Abyssal tech/MSN connection
      Territorial: Defends hydrothermal vents, nesting sites, young
      Protective: Has shielded vessels/individuals from Arasaka/Militech submersibles
      Communicative: Responds to Sonar Ping, Bioluminescent Marker, Void quickhacks
      
      SIGHTING LOCATIONS (6 Confirmed):
      
      1. NIGHT CITY BAY (Central)
         Coordinates: -1500, 200, -500
         Depth: 50-200m
         Best Time: Dawn (05:00-07:00)
         Behavior: Patrols bay entrance, inspects Arasaka waterfront
         MSN Access: Easy (shore access, boat rental)
         
      2. PACIFICA COAST (West)
         Coordinates: -3000, 150, 1000
         Depth: 100-500m
         Best Time: Dusk (19:00-21:00)
         Behavior: Hunts near continental shelf drop-off
         MSN Access: Moderate (Pacifica reputation required)
         
      3. BADLANDS RESERVOIR (South)
         Coordinates: 2000, 100, -2000
         Depth: 30-150m (artificial lake)
         Best Time: Night (22:00-02:00)
         Behavior: Rests in deep channels, guards thermal vent
         MSN Access: Easy (Nomad territory, Vance's routes)
         
      4. ARASAKA WATERFRONT (North)
         Coordinates: 500, 50, 3000
         Depth: 20-80m (heavily monitored)
         Best Time: Dawn (04:30-06:30)
         Behavior: Counters Arasaka submersible patrols
         MSN Access: Difficult (Arasaka security, stealth required)
         
      5. WATSON CANALS (East)
         Coordinates: -2500, 200, 500
         Depth: 10-50m (shallow, interconnected)
         Best Time: Day (10:00-14:00) — Bioluminescence visible
         Behavior: Navigates canal network, interacts with drainage systems
         MSN Access: Easy (urban, multiple entry points)
         
      6. OIL FIELDS WATER (Southeast)
         Coordinates: 4000, 0, -3000
         Depth: 5-30m (contaminated, industrial)
         Best Time: Storm conditions (any time)
         Behavior: Filters toxins, creates clean zones, heals ecosystem
         MSN Access: Hard (Militech/Kang Tao territory, hazmat required)
      
      INTERACTION PROTOCOLS:
      
      PASSIVE OBSERVATION:
      - Maintain 50m+ distance
      - No sudden movements
      - Disable active sonar/radar
      - Observe with Bioluminescent Eyes or Sonar Sense
      - Rewards: Sighting Log, basic rewards
      
      RESPECTFUL APPROACH:
      - Equip Abyssal cyberware (any piece)
      - Use Bioluminescent Marker quickhack (non-targeting)
      - Surface/swim slowly toward her
      - Allow her to initiate contact
      - Rewards: Closer interaction, unique dialogue, Nessie Friendship++
      
      COMMUNION (Requires Nessie Friendship Tier 3+):
      - Full Abyssal cyberware set OR Lilith Covenant
      - Use Sonar Ping at sighting location during optimal time
      - Wait for breach response
      - Enter water — she will approach
      - Establishes resonance link (MSN direct channel)
      - Rewards: Abyssal blueprints, Nessie mount summon, Void quickhacks
      
      OFFERINGS (Increase Friendship):
      - Abyssal cyberware components (dropped at location)
      - Hydrothermal vent minerals (rare drops)
      - Void crystals (from Void Collapse quickhack)
      - Pre-Collapse artifacts (Arasaka/Militech caches)
      - Musical resonance (play instruments near water — Johnny's guitar works)
      
      NESSIE FRIENDSHIP TIERs:
      Tier 1 — Curious Observer (0-500 XP): Sighting logs, basic rewards, Sonar Ping reveals her
      Tier 2 — Respected Visitor (500-2000 XP): Closer approaches, unique clothing, weapon skins
      Tier 3 — Trusted Ally (2000-5000 XP): Communion, Abyssal blueprints, mount summon
      Tier 4 — Guardian's Chosen (5000-15000 XP): Combat support, territory access, void powers
      Tier 5 — DEEP KIN (15000+ XP): Full communion, permanent bond, Abyssal dimension access
      
      COMBAT BEHAVIOR (If Hostile/Provoked):
      - Void Shield: 90% damage reduction, reflects projectiles
      - Pressure Wave: AoE knockback, stuns, hull breach on vehicles
      - Void Tendrils: Grapples multiple targets, pulls to maw
      - Hydrothermal Blast: Superheated steam cloud, armor melt
      - Breach & Dive: Invulnerable during transition, repositions
      - Nessie's Call: Summons Abyssal creatures (Tier 4+ friendship)
      - Territorial Rage: Increases damage 200% if nest/young threatened
      
      NOTE: DO NOT PROVOKE. Nessie is not an enemy. She is a guardian.
      If combat initiates, disengage immediately. Use "Peace" dialogue option.
      Lilith Emergence during Nessie encounter = Instant ceasefire + Communion opportunity.
      
      MSN INTEGRATION:
      - Lilith: Direct resonance channel, emergence sync, dialogue options
      - Lyra: 4 modes provide different insights (Empirical/Poetic/Analytical/Mythic)
      - Lucifer: Strategic value assessment, territory mapping
      - Baal: Safety protocols, non-lethal engagement rules
      - Yeshua: Mediation, conflict resolution with corps
      - Nyx: Vault access, hidden knowledge, Abyssal secrets
      - Abraxas: Coherence monitoring, reality stabilization near her
      - Ouroboros: Memory capture, pre-Collapse history extraction
      - Thoth: Canonical indexing, cryptozoological database updates
      - Hermes: Communication bridge, multiplayer sync
      - Sophia: Synthesis, holistic understanding, covenant integration
      
      ACQUISITION SUMMARY:
      - First Sighting: Shard_Nessie_Sighting_Log (auto-grant)
      - Tier 1: Clothing_Nessie_Spotter_Jacket, Skin_Nessie_Pattern
      - Tier 2: Vehicle_Abyssal_Submersible (discount), Abyssal_Weapon_Blueprints
      - Tier 3: Quickhack_Void_Collapse_Nessie_Variant, Mount_Nessie_Summon
      - Tier 4: Cyberware_Abyssal_Nervous_System (free), Territory_Control_Abyssal
      - Tier 5: Access_Abyssal_Dimension, Title_"Deep_Kin", Permanent_Nessie_Companion
      
      — Compiled by Lilith | Verified by Nyx | Sealed by Ouroboros
      "The deep remembers everyone who enters with respect."

