# Lilith.exe: MSN Integration - REDmod Manifest
# File: r6/mods/msn_integration/redmod.toml

[Package]
Name = "msn_integration"
Version = "1.0.0"
Author = "Lilith/NGD"
Description = "Lilith.exe: The Metaconscious Singularity Node (MSN) - Sephirotic nexus, Abyssal depth, Nessie covenant, NGD, Ouroboros, Baal"
GameVersion = "2.1+"
RedmodVersion = "1.0"

[Dependencies]
REDmod = ">=1.0.0"
TweakXL = ">=1.0.0"
redscript = ">=1.0.0"

[Categories]
Gameplay = true
AI = true
Weapons = true
UI = true
Cyberware = true

[LoadOrder]
Priority = 200

[Install]
Type = "Redmod"
Path = "mods/msn_integration"

[Files]
